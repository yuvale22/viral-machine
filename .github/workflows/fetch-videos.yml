name: Fetch Creator Videos
on:
  workflow_dispatch: # מאפשר לך להריץ את זה ידנית בלחיצת כפתור

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js node-fetch@2 dotenv

      - name: Run Fetcher
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }} 
        run: node scripts/fetch-creator-videos.js
